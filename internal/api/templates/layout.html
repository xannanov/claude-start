{{define "layout"}}<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{template "title" .}} — ТренерНаПочте</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        :root {
            --brand: #1e293b;
            --accent: #f97316;
            --accent-hover: #ea580c;
            --accent-light: #fff7ed;
            --accent-border: #fed7aa;
            --bg: #fafafa;
            --surface: #ffffff;
            --border: #e5e7eb;
            --muted: #6b7280;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #1f2937; font-family: system-ui, -apple-system, sans-serif; margin: 0; }

        /* ===== Nav ===== */
        .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0; margin-bottom: 2rem; }
        .nav-inner {
            max-width: 800px; margin: 0 auto; padding: 0.6rem 1rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-brand { font-weight: 700; font-size: 1.1rem; color: var(--brand); text-decoration: none; white-space: nowrap; }
        .nav-brand span { color: var(--accent); }
        .nav-menu {
            display: flex; gap: 0.125rem; align-items: center;
            list-style: none; margin: 0; padding: 0;
        }
        .nav-menu li { list-style: none; margin: 0; padding: 0; }
        .nav-menu li::before, .nav-menu li::marker { content: none; display: none; }
        .nav-link, .nav-btn {
            display: inline-flex; align-items: center; gap: 0.35rem;
            color: var(--muted); text-decoration: none; font-size: 0.85rem;
            padding: 0.45rem 0.7rem; border-radius: 6px;
            border: none; background: none; cursor: pointer; white-space: nowrap;
        }
        .nav-link:hover, .nav-btn:hover { background: #f3f4f6; color: var(--brand); }
        .nav-link.active { color: var(--brand); font-weight: 600; }
        .nav-link svg, .nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

        /* ===== Content ===== */
        .page { max-width: 800px; margin: 0 auto; padding: 0 1rem 3rem; }
        .page-narrow { max-width: 460px; }
        .page-medium { max-width: 580px; }

        /* ===== Sections ===== */
        .section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; margin-bottom: 1.25rem; }
        .section-title { font-size: 1.1rem; font-weight: 600; margin: 0 0 1rem; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 0.75rem; flex-wrap: wrap; }
        .section-header .section-title { margin-bottom: 0; }

        /* ===== Alerts ===== */
        .alert-error { color: #991b1b; background: #fef2f2; border: 1px solid #fecaca; padding: 0.625rem 1rem; border-radius: 8px; margin-bottom: 1.25rem; font-size: 0.9rem; }
        .alert-success { color: #166534; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 0.625rem 1rem; border-radius: 8px; margin-bottom: 1.25rem; font-size: 0.9rem; }

        /* ===== Stats ===== */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.75rem; }
        .stat { text-align: center; padding: 0.75rem 0.5rem; background: var(--accent-light); border-radius: 8px; }
        .stat-val { font-size: 1.35rem; font-weight: 700; color: var(--accent-hover); line-height: 1; }
        .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

        /* ===== Schedule rows ===== */
        .sched-row { display: flex; align-items: center; justify-content: space-between; padding: 0.625rem 0; border-bottom: 1px solid #f3f4f6; gap: 0.5rem; }
        .sched-row:last-child { border-bottom: none; }
        .sched-left { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; min-width: 0; }
        .sched-day { font-weight: 600; font-size: 0.9rem; min-width: 110px; }
        .sched-time { font-family: ui-monospace, monospace; font-weight: 600; color: var(--accent); font-size: 0.95rem; }
        .sched-type { font-size: 0.75rem; color: var(--muted); background: #f3f4f6; padding: 0.15rem 0.5rem; border-radius: 4px; }

        /* ===== Buttons ===== */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem; padding: 0.5rem 1.25rem; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; text-decoration: none; border: none; text-align: center; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); color: #fff; }
        .btn-outline { background: none; color: var(--brand); border: 1px solid var(--border); }
        .btn-outline:hover { background: #f9fafb; }
        .btn-danger { background: none; color: var(--danger); border: 1px solid #fecaca; padding: 0.35rem 0.75rem; font-size: 0.8rem; border-radius: 6px; cursor: pointer; }
        .btn-danger:hover { background: #fef2f2; }
        .btn-full { width: 100%; }
        .btn-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

        /* ===== Auth pages ===== */
        .auth-header { text-align: center; margin-bottom: 1.75rem; }
        .auth-header h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .auth-subtitle { color: var(--muted); font-size: 0.9rem; }
        .auth-footer { text-align: center; margin-top: 1.25rem; color: var(--muted); font-size: 0.875rem; }
        .auth-footer a { color: var(--accent); }

        /* ===== Forms ===== */
        fieldset { border: none; padding: 0; margin: 0 0 0.75rem; }
        legend { font-weight: 600; font-size: 0.9rem; color: var(--brand); margin-bottom: 0.5rem; padding: 0; }
        label { font-size: 0.875rem; }
        .grid { gap: 0.75rem; }
        button[type="submit"]:not(.nav-btn):not(.btn-danger):not(.btn) { background: var(--accent); border-color: var(--accent); }
        button[type="submit"]:not(.nav-btn):not(.btn-danger):not(.btn):hover { background: var(--accent-hover); border-color: var(--accent-hover); }

        /* ===== Misc ===== */
        a.subtle { color: var(--muted); font-size: 0.875rem; text-decoration: none; }
        a.subtle:hover { color: var(--brand); }
        .accent-link { color: var(--accent); }
        .accent-link:hover { color: var(--accent-hover); }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .nav-inner { padding: 0.5rem 0.75rem; }
            .nav-menu { gap: 0; }
            .nav-link, .nav-btn { padding: 0.4rem 0.5rem; font-size: 0.8rem; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .sched-row { flex-direction: column; align-items: flex-start; gap: 0.375rem; }
            .section { padding: 1rem; }
            .page { padding: 0 0.75rem 2rem; }
            .grid { grid-template-columns: 1fr !important; }
            .btn-row { flex-direction: column; }
            .btn-row .btn { width: 100%; }
        }
    </style>
</head>
<body>
    {{template "content" .}}
</body>
</html>{{end}}
