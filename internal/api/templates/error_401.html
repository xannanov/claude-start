{{define "title"}}Требуется авторизация{{end}}
{{define "content"}}
<main class="page page-narrow" style="margin-top:5rem; text-align:center;">
    <div style="font-size:5rem; line-height:1; margin-bottom:1rem; user-select:none;">🚧</div>
    <h1 style="font-size:1.75rem; margin-bottom:0.5rem;">Сюда без пропуска</h1>
    <p style="color:var(--muted); margin-bottom:0.5rem;">Даже тренер с виду серьёзный — сначала авторизуется.</p>
    <p style="color:var(--muted); font-size:0.875rem; margin-bottom:2rem;">Войдите или создайте аккаунт, это займёт минуту.</p>
    <div class="btn-row" style="justify-content:center;">
        <a href="/login" class="btn btn-primary">Войти</a>
        <a href="/register" class="btn btn-outline">Зарегистрироваться</a>
    </div>
</main>
{{end}}
