{{define "title"}}Регистрация{{end}}
{{define "content"}}
<main class="page page-medium" style="margin-top:2rem;">
    <div class="section">
        <div class="auth-header">
            <h1>Тренер<span style="color:var(--accent)">На</span>Почте</h1>
            <p class="auth-subtitle">Регистрация — 2 минуты. Первая тренировка — чуть дольше.</p>
        </div>

        {{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}

        <form method="POST" action="/register">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <div hidden aria-hidden="true"><input type="text" name="website" tabindex="-1" autocomplete="off"></div>

            <fieldset>
                <legend>Аккаунт</legend>
                <div class="grid">
                    <label>Email
                        <input type="email" name="email" value="{{index .Form "email"}}" placeholder="you@example.com" required>
                    </label>
                    <label>Пароль
                        <input type="password" name="password" minlength="6" placeholder="Минимум 6 символов" required>
                    </label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Личные данные</legend>
                <div class="grid">
                    <label>Имя
                        <input type="text" name="first_name" value="{{index .Form "first_name"}}" placeholder="Иван" required>
                    </label>
                    <label>Фамилия
                        <input type="text" name="last_name" value="{{index .Form "last_name"}}" placeholder="Иванов" required>
                    </label>
                </div>
                <div class="grid">
                    <label>Возраст
                        <input type="number" name="age" min="13" max="120" value="{{index .Form "age"}}" placeholder="25" required>
                    </label>
                    <label>Пол
                        <select name="gender" required>
                            <option value="" disabled {{if eq (index .Form "gender") ""}}selected{{end}}>Выберите</option>
                            <option value="male" {{if eq (index .Form "gender") "male"}}selected{{end}}>Мужской</option>
                            <option value="female" {{if eq (index .Form "gender") "female"}}selected{{end}}>Женский</option>
                            <option value="other" {{if eq (index .Form "gender") "other"}}selected{{end}}>Другой</option>
                        </select>
                    </label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Параметры тела <span style="font-weight:400; color:var(--muted); font-size:0.8rem;">(честно, мы проверим)</span></legend>
                <div class="grid">
                    <label>Рост, см
                        <input type="number" name="height_cm" min="100" max="250" value="{{index .Form "height_cm"}}" placeholder="175" required>
                    </label>
                    <label>Вес, кг
                        <input type="number" name="weight_kg" min="30" max="300" step="0.1" value="{{index .Form "weight_kg"}}" placeholder="75" required>
                    </label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Цели</legend>
                <label>Цель тренировок
                    <select name="goal" required>
                        <option value="" disabled {{if eq (index .Form "goal") ""}}selected{{end}}>Выберите цель</option>
                        {{range $key, $name := .GoalNames}}
                        <option value="{{$key}}" {{if eq (index $.Form "goal") $key}}selected{{end}}>{{$name}}</option>
                        {{end}}
                    </select>
                </label>
                <label>Уровень активности
                    <select name="activity_level" required>
                        <option value="" disabled {{if eq (index .Form "activity_level") ""}}selected{{end}}>Выберите уровень</option>
                        {{range $key, $name := .ActivityNames}}
                        <option value="{{$key}}" {{if eq (index $.Form "activity_level") $key}}selected{{end}}>{{$name}}</option>
                        {{end}}
                    </select>
                </label>
            </fieldset>

            <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">Начать качаться 🏃</button>
        </form>

        <p class="auth-footer">Уже есть аккаунт? <a href="/login">Вернуться</a></p>
    </div>
</main>
{{end}}
